name: Build APK Standalone (Expo)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Cache Gradle (biar cepat)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # 5. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. Install Expo CLI
      - name: Install Expo CLI
        run: npm install -g expo-cli

      # 8. Generate native android (PENTING)
      - name: Expo Prebuild (Generate Native Code)
        run: npx expo prebuild --platform android --clean

      # 8.1 Verify notification icon wiring from app.json -> native Android
      - name: Verify Notification Icon Resources
        run: |
          test -f assets/notification-icon.png
          test -f android/app/src/main/AndroidManifest.xml
          grep -q 'expo.modules.notifications.default_notification_icon' android/app/src/main/AndroidManifest.xml
          grep -q 'com.google.firebase.messaging.default_notification_icon' android/app/src/main/AndroidManifest.xml
          grep -q '@drawable/notification_icon' android/app/src/main/AndroidManifest.xml
          test -f android/app/src/main/res/drawable-mdpi/notification_icon.png
          test -f android/app/src/main/res/drawable-hdpi/notification_icon.png
          test -f android/app/src/main/res/drawable-xhdpi/notification_icon.png
          test -f android/app/src/main/res/drawable-xxhdpi/notification_icon.png
          test -f android/app/src/main/res/drawable-xxxhdpi/notification_icon.png

      # 9. Masuk ke android folder & kasih permission
      - name: Grant permission
        run: chmod +x android/gradlew

      # 10. Build APK (STANDALONE)
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --parallel

      # 11. Upload APK hasil
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk